spring:
  application:
    name: fintech-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintechdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 2000
      idle-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-random-secret-key-minimum-64-chars}
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-ms: 604800000

  session:
    # remember_me=false -> browser session, 24 hours
    # remember_me=true  -> persistent session, 30 days
    default-expiry-hours: 24
    remember-me-expiry-days: 30
    cleanup-cron: "0 0 3 * * *"            # clean expired sessions at 3 AM daily

  fx:
    usd-to-inr: 90.50   # mock exchange rate

  mock-kyb:
    auto-approve-delay-ms: 172800000   # simulated processing time

  payment:
    ach-standard-days: 3
    ach-same-day-cutoff: "14:00"   # 2 PM Eastern
    wire-cutoff: "17:00"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.fintech: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
